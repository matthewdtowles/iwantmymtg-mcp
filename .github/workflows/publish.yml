name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Skipped publish: tag ${GITHUB_REF#refs/tags/} points at a commit that isn't on main."
            echo "Merge your branch into main first, then tag the resulting commit and push the tag."
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Verify package.json version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
      - run: npm publish --access public --provenance

      # --- Publish to the MCP Registry (after npm, so the registry can
      # validate the just-published package, which now carries mcpName) ---
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Sync server.json version to tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json
      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      # --- Publish the local bundle to Smithery (optional, non-blocking).
      # Runs last and continue-on-error so a Smithery hiccup never fails a
      # release where the irreversible npm publish already succeeded. Skips
      # cleanly when SMITHERY_API_KEY is not set. ---
      - name: Publish to Smithery
        continue-on-error: true
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          if [ -z "$SMITHERY_API_KEY" ]; then
            echo "SMITHERY_API_KEY not set; skipping Smithery publish."
            exit 0
          fi
          npm run bundle
          npx -y @smithery/cli mcp publish ./iwantmymtg-mcp.mcpb -n matthewdtowles/iwantmymtg-mcp
